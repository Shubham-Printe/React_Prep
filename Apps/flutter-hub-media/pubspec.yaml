name: media_hub
description: Flutter port of the React Native HUB media demo (voice + camera).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  record: ^5.1.2
  audioplayers: ^6.1.0
  video_player: ^2.9.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
